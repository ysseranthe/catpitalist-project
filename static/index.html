<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catpitalist</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script type="importmap">
    {
      "imports": {
        "config": "/static/js/config.js?v=1.0.11",
        "state":  "/static/js/state.js?v=1.0.11",
        "api":    "/static/js/api.js?v=1.0.11",
        "ui":     "/static/js/ui.js?v=1.0.11"
      }
    }
    </script>

    <script type="module" src="/static/js/app.js?v=1.0.11"></script>

</head>
<body>

    <div id="loader-screen" class="loader-screen">
        <div class="spinner"></div>
        <h1>Catpitalist</h1>
    </div>

    <div id="app-container" class="app-container hidden">

        <header class="top-bar">
            <div class="user-info">
                <img src="/static/images/user.png" alt="User Icon">
                <span id="username-display">Loading...</span>
            </div>
            <div class="game-title">
                <span>Catpitalist</span>
            </div>
        </header>

        <main id="main-content" class="main-content">

            <section class="stats-panel">
                <div class="stat-block">
                    <span class="stat-title">Tap earn</span>
                    <div class="stat-value">
                        <img src="/static/images/ctp.png" alt="Coin">
                        <span id="tap-earn-value">+2</span>
                    </div>
                </div>
                <div class="stat-block">
                    <span class="stat-title">Catps to level up</span>
                    <div class="stat-value">
                        <span id="level-up-cost">50K</span>
                    </div>
                </div>
                <div class="stat-block">
                    <span class="stat-title">Profit per hour</span>
                    <div class="stat-value">
                        <img src="/static/images/ctp.png" alt="Coin">
                        <span id="profit-value">+400</span>
                    </div>
                </div>
            </section>

            <section class="score-container">
                <img src="/static/images/ctp.png" alt="Coin">
                <span id="score">1.000</span>
            </section>

            <section class="level-progress">
                <div class="level-info">
                    <span id="level-name">Homeless ></span>
                    <span id="level-progress-text">1/15</span>
                </div>
                <div class="progress-bar-background">
                    <div id="progress-bar-foreground" class="progress-bar-foreground"></div>
                </div>
            </section>

            <section id="cat-container" class="cat-container">
                <div id="cat" class="cat-character"></div>
                <div id="click-area"></div>
            </section>

            <section class="energy-bar">
                <img src="/static/images/power.png" alt="Energy">
                <span id="energy-level">100/100</span>
            </section>

        </main>

        <section id="upgrades-screen" class="screen-content hidden">
            <h2 class="screen-title">Upgrades</h2>

            <div class="sub-tab-nav">
                <button class="sub-tab-button active" data-tab="tap">
                    <img src="/static/images/social.png" alt="Tap">
                    <span>Tap</span>
                </button>
                <button class="sub-tab-button" data-tab="passive">
                    <img src="/static/images/productivity.png" alt="Passive">
                    <span>Passive</span>
                </button>
                <button class="sub-tab-button" data-tab="energy">
                    <img src="/static/images/power.png" alt="Energy">
                    <span>Energy</span>
                </button>
            </div>

            <div id="upgrades-list-container" class="upgrades-list-container">
            </div>
        </section>

        <footer class="tab-bar">
            <button class="tab-button" data-screen="upgrades-screen">
                <img src="/static/images/productivity.png" alt="Upgrades">
                <span>Upgrades</span>
            </button>
            <button class="tab-button" data-screen="empire-screen">
                <img src="/static/images/briefcase.png" alt="Empire">
                <span>Empire</span>
            </button>
            <button class="tab-button active" data-screen="main-content">
                <img src="/static/images/social.png" alt="Tap">
                <span>Tap</span>
            </button>
            <button class="tab-button">
                <img src="/static/images/checklist.png" alt="Tasks">
                <span>Tasks</span>
            </button>
            <button class="tab-button">
                <img src="/static/images/link.png" alt="Friends">
                <span>Friends</span>
            </button>
        </footer>

        <div id="level-modal-overlay" class="modal-overlay hidden">
            <div id="level-modal-content" class="modal-content">
                
                <div class="modal-header">
                    <h2>Your Level Progression</h2>
                    <button id="level-modal-close-btn" class="modal-close-btn">&times;</button>
                </div>

                <div class="current-level-hero">
                    <div class="hero-text-block">
                        <span>Level</span>
                        <strong id="hero-level-number">0</strong>
                    </div>
                    <div id="hero-cat-avatar" class="hero-cat-avatar"></div>
                    <div class="hero-text-block hero-text-block-right">
                        <span id="hero-level-name">Noob</span>
                    </div>
                </div>

                <div id="level-progression-list" class="level-progression-list">
                </div>

            </div>
        </div>
    </div>
    
    <template id="upgrade-card-template">
        <div class="upgrade-card">
            <div class="upgrade-image-side">
                <img src="" class="upgrade-main-img">
                <div class="lock-overlay hidden">
                    <img src="/static/images/lock.png">
                </div>
            </div>

            <div class="upgrade-details-side">
                <div class="upgrade-header">
                    <h3 class="upgrade-name"></h3>
                </div>
                
                <div class="upgrade-stats-row">
                    <div class="stat-group">
                        <span>Current Level</span>
                        <strong class="upgrade-level"></strong>
                    </div>
                    
                    <div class="divider"></div>
                    
                    <div class="stat-group">
                        <span class="bonus-title">Bonus</span>
                        <strong class="upgrade-bonus"></strong>
                    </div>
                    
                    <div class="divider"></div>
                    
                    <div class="stat-group price-group">
                        <div class="price-wrapper">
                            <img src="/static/images/ctp.png">
                            <strong class="upgrade-price"></strong>
                        </div>
                    </div>
                </div>

                <div class="upgrade-requirement hidden">
                    <span>Level required</span>
                    <strong class="req-level-val"></strong>
                </div>
            </div>
        </div>
    </template>
</body>
</html>
